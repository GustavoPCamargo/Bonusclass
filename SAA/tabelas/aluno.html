<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
*{
    margin: 0px;
    padding: 0px;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

:root{
    --cor-principal:  rgb(243, 247, 244);
    --cor-destaque: rgb(55, 172, 99);
    --cor-texto: rgb(0, 0, 0);
    --cor-texto-destaque: rgb(46, 46, 46);
    --card: rgb(255, 255, 255);
}

.container{
    background-color: white;
    text-align: center;
    width: 100%;
    height: 65%;
    padding: 30px;
    border-radius: 8px;
    min-height: fit-content;
}

#agendar{
    width: 100%;
    height: 50px;
    color: black;
    background-color: rgba(0, 128, 0, 0.521);
    border: none;
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    transition: 0.5s;
    text-decoration: none;
}

#agendar:hover{
    background-color: green;
    cursor: pointer;
    transition: 0.5s;
}

#ajustar{
    width: 100%;
    height: 50px;
    color: black;
    background-color: rgba(255, 255, 0, 0.521);
    border: none;
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    transition: 0.5s;
    text-decoration: none;
}

#ajustar:hover{
    background-color: yellow;
    cursor: pointer;
    transition: 0.5s;

}

#cancelar{
    width: 100%;
    height: 50px;
    color: black;
    background-color: rgba(255, 0, 0, 0.521);
    border: none;
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    transition: 0.5s;
    text-decoration: none;
}

#cancelar:hover{
    background-color: red;
    cursor: pointer;
    transition: 0.5s;
}
</style>
<body>
    <div class="container">
                <h4>O que você deseja fazer?</h4>
                <p>Escolha uma ação para sua aula bônus.</p>
                <div class="opçoes">
                    <a href="novo_agendamento.html"><button id="agendar">Agendar aula</button></a>
                    <a href="ajustar.html"><button id="ajustar">Ajustar aula</button></a>
                    <a href="cancelar.html"><button id="cancelar">Cancelar aula</button></a>
                </div>
                <p>Como você ainda não tem aula agendada, as opções de alterar e cancelar estão indisponíveis.</p>
    </div>
</body>
</html>
