<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }

        .container{
            background-color: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            margin: 0 80px 40px 80px;
            max-width: 85%;

            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        label {
            width: 85%;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }

        form{
            width: 100%;
        }

        input, select{
            padding: 6px;
            width: 85%;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 6px;
        }

        #salvar{
            background-color: rgb(55, 172, 99);
            transition: 0.3s;
            width: 100%;
            cursor: pointer;
        }
        #salvar:hover{
            background-color: rgb(0, 165, 63);
            transition: 0.3s;
        }

        #cpf, #senha, #tipoUser {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastrar Usuário</h2>

        <form id="cadastro" onsubmit="cadastrar(event)">
            <label>CPF</label><br>
            <input type="text" id="cpf" maxlength="14" placeholder="Digite o CPF" required><br>
      
            <label>Senha</label><br>
            <input type="password" id="senha" placeholder="Digite a Senha de acesso" minlength="8"><br>   

            <label>Identificação</label><br>
            <select id="tipoUser">
                <option value="aluno">Aluno</option> 
                <option value="professor">Professor(a)</option>
                <option value="coordenador">Coordenador</option>
            </select> <br>

            <input type="submit" id="salvar" value="Cadastrar">
        </form>
    </div>
    <script src="../scripts/mascara_cpf.js"></script>
    <script src="../scripts/cadastro.js"></script>
</body>
</html>
