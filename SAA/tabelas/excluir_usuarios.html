<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Usuário</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }

        .container{
            background-color: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            margin: 0 80px 40px 80px;
            max-width: 85%;

            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        label {
            width: 85%;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }

        form{
            width: 100%;
        }

        input, select{
            padding: 6px;
            width: 85%;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 6px;
        }

        #excluir{
            background-color: rgb(228, 78, 78);
            transition: 0.3s;
            width: 100%;
            cursor: pointer;
        }
        #excluir:hover{
            background-color: rgb(255, 15, 15);
            transition: 0.3s;
        }

        #cpf {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Excluir usuário</h2>

        <form id="deletar" onsubmit="deletar(event)">
            <label>CPF</label><br>
            <input type="text" id="cpf" maxlength="14" placeholder="Digite o CPF para excluir" required><br>

            <input type="submit" id="excluir" value="Excluir Usuário">
        </form>
    </div>
    <script src="../scripts/mascara_cpf.js"></script>
    <script src="../scripts/excluir.js"></script>
</body>
</html>
