<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bonus Class</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    :root{
      --cor-principal:  rgb(243, 247, 244);
      --cor-destaque: rgb(55, 172, 99);
      --cor-texto: rgb(0, 0, 0);
      --cor-texto-destaque: rgb(46, 46, 46);
      --card: rgb(255, 255, 255);
    }

    .card{
      background:white;
      padding:30px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    .card h2{
      margin-bottom:10px;
    }

    .card p{
      color:#666;
      margin-bottom:30px;
    }

    .row{
      display:flex;
      gap:20px;
      margin-bottom:20px;
    }

    .input-group{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    label{
      margin-bottom:8px;
      font-weight:bold;
    }

    input, select{
      height:45px;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:16px;
    }

    .buttons{
      display:flex;
      gap:10px;
      margin-top:20px;
    }

    .btn-primary{
      flex:1;
      height:45px;
      border:none;
      background: var(--cor-destaque);
      color:white;
      font-size:16px;
      border-radius:6px;
      cursor:pointer;
    }

    .btn-primary:hover{
      background: rgb(39, 140, 76);
      transition: 0.3s;
    }

    .btn-secondary{
      width:150%;
      height: 100%;
      border:1px solid #ccc;
      background:white;
      border-radius:6px;
    }

    .btn-secondary:hover{
        color: white;
        background-color: var(--cor-destaque);
        cursor: pointer;
        transition: 0.5s;
    }

    @media(max-width:700px){
      .row{ flex-direction:column; }
    }

    .alert-section { margin-top:60px; }
    .alert-section .input-group.alert-button-group .btn-primary {
      width: 100%;
      flex: none;
      height: 45px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      box-sizing: border-box;
      line-height: normal;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h2>Novo agendamento</h2>
      <p>Preencha os dados abaixo para agendar sua aula.</p>

      <div class="row">
        <div class="input-group">
          <label>Idioma</label>
          <select id="idioma">
            <option>Inglês</option>
            <option>Espanhol</option>
          </select>
        </div>

        <div class="input-group">
          <label>Tema da aula</label>
          <input type="text" id="tema" placeholder="Ex: Verbo to be">
        </div>

        <div class="input-group">
          <label>Horário</label>
          <select id="horario">
          </select>
        </div>
      </div>

      <div class="input-group">
        <label>Livro</label>
        <select id="livro">
          <option>English File A2</option>
          <option>English File B1</option>
          <option>Aula Internacional 2</option>
        </select>
      </div>

      <div class="alert-section">
        <p style="font-weight:bold; margin-bottom:8px;">Horário lotado? Ative o alerta de disponibilidade:</p>
        <div class="row">
          <div class="input-group">
            <label>Idioma</label>
            <select id="idioma_alerta">
              <option>Inglês</option>
              <option>Espanhol</option>
            </select>
          </div>

          <div class="input-group">
            <label>Horário lotado</label>
            <select id="horario_lotado">
            </select>
          </div>

          <div class="input-group alert-button-group">
            <button id="ativar_alerta" class="btn-primary">Notificar quando abrir</button>
          </div>
        </div>

        <h3 style="margin-top:18px;">Notificações:</h3>
        <div id="notificacoes" style="min-height:40px; color:#666; padding:8px; border:1px solid #eee; border-radius:6px; background:#fafafa;"></div>
      </div>

      <div class="buttons">
        <button class="btn-primary" onclick="agendar()">
          Agendar Aula
        </button>
        <a href="aluno.html">
            <button class="btn-secondary">Voltar</button>
        </a>
      </div>

    </div>
  </div>

  <script src="../scripts/agendamento.js"></script>
  <script src="../scripts/horarios.js"></script>
  <script>
    function agendar() {
      const tema = document.getElementById("tema").value.trim();

      if (!tema) {
        alert("Por favor, informe o tema da aula.");
        return;
      }

      const dados = {
        idioma:  document.getElementById("idioma").value,
        tema:    tema,
        horario: document.getElementById("horario").value,
        livro:   document.getElementById("livro").value,
        sala:    "Sala 1"
      };

      salvarAgendamento(dados);
      alert("Aula agendada com sucesso!");
      window.parent.location.href = "../tela_aluno.html";
    }
  </script>
</body>
</html>
