<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
*{
    margin: 0px;
    padding: 0px;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}    

:root{
    --cor-principal:  rgb(243, 247, 244);
    --cor-destaque: rgb(55, 172, 99);
    --cor-texto: rgb(0, 0, 0);
    --cor-texto-destaque: rgb(46, 46, 46);
    --card: rgb(255, 255, 255);
}

table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
}

th, td {
    padding: 16px 10px;
    border-bottom: 1px solid #f1f3f5;
}

th {
    color: #777;
    font-weight: 500;
    font-size: 14px;
}

td {
    font-size: 14px;
    color: #333;
}

.tabela {
    background-color: white;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    padding: 20px;
    margin: 0 80px 40px 80px;
}

.badge {
    background-color: #e6f4ec;
    color: #2e7d4f;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 13px;
}
</style>
<body>
     <section class="tabela">
            <h3><i class="fa-solid fa-book-open"></i>Salas</h3>
            <table>
                <thead>
                    <tr>
                        <th>Sala</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sala 1</td>
                        <td>Ocupada</td>
                    </tr>
                    
                    <tr>
                        <td>Sala 2</td>
                        <td>Livre</td>
                    </tr>
                    <tr>
                        <td>Sala 3</td>
                        <td>Livre</td>
                    </tr>
            </tbody>
            </table>

        </section>
</body>
</html>
