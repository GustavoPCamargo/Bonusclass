<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de início</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/style-aluno.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <h1>Bonus Class</h1>
            <p>Aluno</p>
            <img src="imagens/icone-livro.png" alt="icone do livro para indicar o painel de cordenador">
        </div>

        <div class="usuario-area">
            <p>Maria Souza</p>
            <a href="login.html">
                <img src="imagens/saida-icone.png" alt="icone de sair da conta">
            </a>
        </div>
    </header>

    <main>
        <div class="tudo">
            <section class="bem-vindo">
                <h1>Bem-vindo, João Silva!</h1>
                <p>Data da aula bônus: sexta-feira,10 de abril</p>
            </section>
            <div class="container">
                <h4>O que você deseja fazer?</h4>
                <p>Escolha uma ação para sua aula bônus.</p>
                <div class="opçoes">
                    <button id="agendar">Agendar aula</button>
                    <button id="ajustar">Ajustar aula</button>
                    <button id="cancelar">Cancelar aula</button>
                </div>
                <p>Como você ainda não tem aula agendada, as opções de alterar e cancelar estão indisponíveis.</p>
            </div>
        </div>
    </main>
</body>
</html>
